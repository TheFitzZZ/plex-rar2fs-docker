name: Docker Image CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Daily check at 22:00 UTC — rebuilds only if upstream plexinc/pms-docker
    # has a new digest (see "Check upstream" step below).
    - cron: "0 22 * * *"
  workflow_dispatch: {}

# Cancel any in-progress runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------------------------------------------------
      # Skip scheduled (cron) builds when upstream plexinc/pms-docker:latest
      # hasn't changed since our last :latest push.
      # Manual (workflow_dispatch), push and pull_request events always build.
      # ----------------------------------------------------------------------
      - name: Check upstream digest
        id: upstream
        if: github.event_name == 'schedule'
        run: |
          set -euo pipefail
          # Token for Docker Hub (anonymous) — sufficient for public images
          UPSTREAM_TOKEN=$(curl -fsSL \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:plexinc/pms-docker:pull" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          OURS_TOKEN=$(curl -fsSL \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:fitzzz/plex-rar2fs:pull" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")

          UPSTREAM_DIGEST=$(curl -fsSL \
            -H "Authorization: Bearer ${UPSTREAM_TOKEN}" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            -H "Accept: application/vnd.oci.image.manifest.v1+json" \
            -I "https://registry-1.docker.io/v2/plexinc/pms-docker/manifests/latest" \
            | grep -i '^docker-content-digest:' | awk '{print $2}' | tr -d '\r')

          # Read the upstream digest we baked in last time (label on our :latest)
          OURS_MANIFEST=$(curl -fsSL \
            -H "Authorization: Bearer ${OURS_TOKEN}" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://registry-1.docker.io/v2/fitzzz/plex-rar2fs/manifests/latest" || true)
          OURS_CONFIG=$(echo "$OURS_MANIFEST" | python3 -c "import sys,json; print(json.load(sys.stdin).get('config',{}).get('digest',''))" 2>/dev/null || echo "")
          LAST_UPSTREAM=""
          if [ -n "$OURS_CONFIG" ]; then
            LAST_UPSTREAM=$(curl -fsSL \
              -H "Authorization: Bearer ${OURS_TOKEN}" \
              "https://registry-1.docker.io/v2/fitzzz/plex-rar2fs/blobs/${OURS_CONFIG}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('config',{}).get('Labels',{}).get('org.opencontainers.image.base.digest',''))" 2>/dev/null || echo "")
          fi

          echo "Upstream digest:        $UPSTREAM_DIGEST"
          echo "Our last upstream base: $LAST_UPSTREAM"
          if [ "$UPSTREAM_DIGEST" = "$LAST_UPSTREAM" ] && [ -n "$UPSTREAM_DIGEST" ]; then
            echo "Upstream unchanged — skipping scheduled build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "upstream_digest=$UPSTREAM_DIGEST" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------------
      # Login only when we actually intend to push (i.e. not on PRs from forks
      # and not on cron runs that decided to skip).
      # ----------------------------------------------------------------------
      - name: Log in to Docker Hub
        if: |
          github.event_name != 'pull_request' &&
          (github.event_name != 'schedule' || steps.upstream.outputs.skip != 'true')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ----------------------------------------------------------------------
      # Compute tags:
      #   - PR builds:    no push, build-only smoke test
      #   - push/cron:    push :latest + :sha-<short> + :YYYYMMDD
      # ----------------------------------------------------------------------
      - name: Compute tags
        id: meta
        if: github.event_name != 'schedule' || steps.upstream.outputs.skip != 'true'
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date -u +%Y%m%d)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAGS="fitzzz/plex-rar2fs:pr-${{ github.event.pull_request.number }}"
            PUSH=false
          else
            TAGS="fitzzz/plex-rar2fs:latest,fitzzz/plex-rar2fs:sha-${SHORT_SHA},fitzzz/plex-rar2fs:${DATE}"
            PUSH=true
          fi
          {
            echo "tags=${TAGS}"
            echo "push=${PUSH}"
            echo "upstream_digest=${{ steps.upstream.outputs.upstream_digest }}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: github.event_name != 'schedule' || steps.upstream.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ steps.meta.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.base.name=plexinc/pms-docker:latest
            org.opencontainers.image.base.digest=${{ steps.meta.outputs.upstream_digest }}
